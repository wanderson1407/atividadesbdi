<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Atividades BDI Serra</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .login-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 40px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    
    .logo {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      background: #667eea;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 48px;
      color: white;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .info-box {
      background: #f5f5f5;
      border-radius: 5px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: left;
    }
    
    .info-box p {
      color: #555;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .info-box strong {
      color: #333;
    }
    
    .footer {
      margin-top: 30px;
      color: #888;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">📊</div>
    <h1>Atividades BDI Serra</h1>
    <p class="subtitle">Sistema de Gerenciamento de Atividades</p>
    
    <div class="info-box">
      <p><strong>Autenticação Google</strong></p>
      <p>Este sistema utiliza autenticação Google. Apenas usuários autorizados têm acesso.</p>
      <p style="margin-top: 10px;">Entre em contato com o administrador para solicitar acesso.</p>
    </div>
    
    <div class="footer">
      <p>BDI Serra © 2025</p>
      <p>Banco de Dados I</p>
    </div>
  </div>
</body>
</html>
