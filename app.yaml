runtime: python312

# Configurações do App Engine
instance_class: F2

# Configuração de escalonamento automático
automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 1
  max_instances: 10
  min_pending_latency: 30ms
  max_pending_latency: automatic
  max_concurrent_requests: 50

# Variáveis de ambiente
env_variables:
  # IMPORTANTE: Preencha estas variáveis antes do deploy!
  
  # Google Cloud Project ID
  GOOGLE_CLOUD_PROJECT: "atividades-intel"
  
  # Firestore - SEMPRE usar o banco real em produção
  USE_MOCK_FIRESTORE: "false"
  
  # Autenticação - NUNCA ative DEV_AUTH em produção!
  DEV_AUTH: "false"
  
  # Google OAuth Client ID
  # Obtenha em: https://console.cloud.google.com/apis/credentials
  GOOGLE_CLIENT_ID: "945799576026-7dp9aeogap6hmrldi4kpedchitnirci5.apps.googleusercontent.com"
  
  # JWT Secret Key - Gere uma chave FORTE e ÚNICA
  # python -c "import secrets; print(secrets.token_urlsafe(32))"
  SECRET_KEY: "your-super-secret-key-change-this-NOW"
  
  # Configurações do servidor
  PORT: "8080"
  HOST: "0.0.0.0"
  ENVIRONMENT: "production"
  
  # CORS - Especifique apenas origens autorizadas
  # Exemplo: "https://seu-dominio.com,https://www.seu-dominio.com"
  CORS_ORIGINS: "*"

# Handlers customizados (opcional)
handlers:
  # Servir arquivos estáticos
  - url: /static
    static_dir: static
    secure: always
    
  # Todas as outras rotas vão para a aplicação FastAPI
  - url: /.*
    script: auto
    secure: always

# Entrypoint
entrypoint: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
